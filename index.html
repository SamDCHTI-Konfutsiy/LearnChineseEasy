<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字课 · Flashcards</title>
<style>
:root{
  --paper:#F5F3EE; --surface:#FFFFFF;
  --ink:#20232A; --ink-soft:#585B62; --ink-faint:#93908A;
  --line:#DEDAD0; --line-soft:#EAE7DE;
  --accent:#4F46D6; --accent-soft:#ECEBFB; --accent-ink:#FFFFFF;
  --good:#2F6B57; --good-soft:#E4F0EC;
  --warn:#B8862F; --warn-soft:#FBF1DF;
  --bad:#B7312C; --bad-soft:#FBEAE9;
  --radius:8px; --shadow:0 1px 2px rgba(20,20,24,.05),0 6px 18px rgba(20,20,24,.06);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --display:Georgia,"Iowan Old Style","Times New Roman",serif;
  --cjk:"Noto Serif SC","Songti SC","STSong","SimSun",serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);color:var(--ink);font-family:var(--sans);min-height:100vh;
  background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
  background-size:40px 40px;background-position:-1px -1px;
}
.wrap{max-width:820px;margin:0 auto;padding:20px 18px 64px;}
.hidden{display:none!important;}
a{color:var(--accent);}
h1,h2,h3{font-weight:500;}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;margin-bottom:20px;border-bottom:2px solid var(--ink);}
.brand{display:flex;align-items:center;gap:10px;}
.brand .mark{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;background:var(--accent);color:#fff;font-family:var(--cjk);font-size:15px;border-radius:6px;}
.brand h1{font-family:var(--display);font-size:20px;margin:0;}
.topnav{display:flex;gap:4px;align-items:center;}
.navbtn{padding:7px 13px;border-radius:20px;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;border:1px solid transparent;background:none;}
.navbtn:hover{color:var(--ink);}
.navbtn.active{background:var(--ink);color:var(--paper);}
.navbtn.ghost{border-color:var(--line);}

/* cards / surfaces */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-faint);font-weight:700;margin:0 0 10px 2px;}

/* buttons / inputs */
.btn{font-family:var(--sans);font-weight:600;font-size:14px;padding:11px 20px;border-radius:var(--radius);border:1px solid var(--accent);background:var(--accent);color:var(--accent-ink);cursor:pointer;}
.btn:hover{filter:brightness(1.08);}
.btn.secondary{background:transparent;color:var(--ink);border-color:var(--line);}
.btn.danger{background:transparent;color:var(--bad);border-color:var(--bad-soft);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;}
input,textarea{font-family:var(--sans);font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);color:var(--ink);width:100%;}
input:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
label{font-size:12.5px;color:var(--ink-soft);font-weight:600;display:block;margin:12px 0 5px;}
.field:first-child label{margin-top:0;}
.err-msg{color:var(--bad);font-size:13px;margin-top:10px;min-height:16px;}
.msg{font-size:13px;margin-top:10px;color:var(--ink-soft);}

/* auth screen */
#screen-auth{max-width:380px;margin:60px auto 0;}
.auth-toggle{display:flex;gap:2px;margin-bottom:18px;border-bottom:1px solid var(--line);}
.auth-tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:600;color:var(--ink-faint);cursor:pointer;border-bottom:2px solid transparent;}
.auth-tab.active{color:var(--ink);border-color:var(--accent);}

/* deck grid */
.deck-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
@media (max-width:640px){.deck-grid{grid-template-columns:repeat(2,1fr);}}
.deck-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;cursor:pointer;position:relative;text-align:left;}
.deck-card:hover{border-color:var(--accent);}
.deck-card .dk-name{font-size:13.5px;font-weight:600;}
.deck-card .dk-sub{font-size:11px;color:var(--ink-faint);margin-top:3px;}
.deck-card .due-dot{position:absolute;top:10px;right:10px;background:var(--bad);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.custom-deck-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);margin-bottom:8px;}
.custom-deck-row .name{font-weight:600;font-size:14px;cursor:pointer;}
.custom-deck-row .meta{font-size:11.5px;color:var(--ink-faint);}

/* study */
.study-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.study-meta{font-size:12px;color:var(--ink-faint);}
.card-stage{background:var(--surface);border:1px solid var(--line);border-radius:10px;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;box-shadow:var(--shadow);}
.tzg{position:relative;width:100px;height:100px;border:1.5px solid var(--ink-faint);margin:0 auto 10px;}
.tzg::before,.tzg::after{content:"";position:absolute;background-image:linear-gradient(90deg,var(--ink-faint) 40%,transparent 0%);background-size:6px 1px;background-repeat:repeat-x;}
.tzg::before{left:0;right:0;top:50%;height:1px;}
.tzg::after{top:0;bottom:0;left:50%;width:1px;background-image:linear-gradient(var(--ink-faint) 40%,transparent 0%);background-size:1px 6px;background-repeat:repeat-y;}
.tzg span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--cjk);font-size:56px;line-height:1;color:var(--ink);}
.front-text{font-size:22px;font-weight:600;text-align:center;}
.pinyin-text{font-family:var(--sans);font-size:16px;color:var(--accent);margin-top:10px;font-weight:600;}
.back-text{font-size:16px;color:var(--ink-soft);margin-top:8px;text-align:center;}
.grade-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;}
.grade-btn{padding:12px 4px;border-radius:var(--radius);border:1px solid var(--line);background:var(--surface);cursor:pointer;font-size:12.5px;font-weight:700;}
.grade-btn.again{color:var(--bad);border-color:var(--bad-soft);}
.grade-btn.hard{color:var(--warn);border-color:var(--warn-soft);}
.grade-btn.good{color:var(--good);border-color:var(--good-soft);}
.grade-btn.easy{color:var(--accent);border-color:var(--accent-soft);}
.grade-btn:hover{filter:brightness(.97);}
.empty-state{text-align:center;color:var(--ink-faint);padding:50px 20px;}

/* card list in deck detail */
.card-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line-soft);font-size:13.5px;}
.card-row .cf{font-weight:600;}
.card-row .cb{color:var(--ink-faint);}
.x-btn{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:16px;padding:2px 6px;}
.x-btn:hover{color:var(--bad);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:all .25s ease;z-index:80;font-weight:600;}
.banner{background:var(--warn-soft);color:var(--warn);border-radius:var(--radius);padding:12px 14px;font-size:13px;margin-bottom:16px;}
.blocked-box{max-width:400px;margin:80px auto;text-align:center;}
.blocked-box .icon{font-size:32px;}
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ AUTH SCREEN ============ -->
  <div id="screen-auth">
    <div class="topbar" style="border:none;margin-bottom:24px;">
      <div class="brand"><span class="mark">学</span><h1>Flashcards</h1></div>
    </div>
    <div class="card">
      <div class="auth-toggle">
        <div class="auth-tab active" data-mode="login">Kirish</div>
        <div class="auth-tab" data-mode="register">Ro'yxatdan o'tish</div>
      </div>
      <form id="authForm">
        <div class="field">
          <label>Email</label>
          <input type="email" id="authEmail" required autocomplete="email">
        </div>
        <div class="field">
          <label>Parol</label>
          <input type="password" id="authPassword" required minlength="6" autocomplete="current-password">
        </div>
        <div class="btn-row" style="margin-top:16px;">
          <button type="submit" class="btn" id="authSubmitBtn" style="width:100%;">Kirish</button>
        </div>
        <div class="err-msg" id="authErr"></div>
      </form>
    </div>
  </div>

  <!-- ============ BLOCKED SCREEN ============ -->
  <div id="screen-blocked" class="hidden">
    <div class="blocked-box card">
      <div class="icon">⛔</div>
      <h2>Hisobingiz faollashtirilmagan</h2>
      <p style="color:var(--ink-soft);font-size:14px;">Administrator hisobingizni vaqtincha bloklagan. Savollaringiz bo'lsa, administratorga murojaat qiling.</p>
      <button class="btn secondary" id="blockedLogoutBtn">Chiqish</button>
    </div>
  </div>

  <!-- ============ MAIN APP ============ -->
  <div id="screen-app" class="hidden">
    <div class="topbar">
      <div class="brand"><span class="mark">学</span><h1>Flashcards</h1></div>
      <div class="topnav">
        <button class="navbtn active" data-tab="dashboard">Bosh sahifa</button>
        <button class="navbtn" data-tab="decks">To'plamlar</button>
        <a id="adminLink" href="admin.html" class="navbtn ghost hidden">Admin</a>
        <button class="navbtn ghost" id="logoutBtn">Chiqish</button>
      </div>
    </div>

    <!-- DASHBOARD TAB -->
    <div id="tab-dashboard" class="tabpanel">
      <p class="section-label">HSK darajalar</p>
      <div class="deck-grid" id="hskGrid"></div>
      <p class="section-label">Mening to'plamlarim</p>
      <div id="customDeckList"></div>
      <button class="btn secondary" id="newDeckBtnDash">+ Yangi to'plam</button>
    </div>

    <!-- DECKS TAB -->
    <div id="tab-decks" class="tabpanel hidden">
      <div id="deckListView">
        <div class="btn-row" style="margin-bottom:16px;">
          <button class="btn" id="newDeckBtn">+ Yangi to'plam</button>
        </div>
        <div id="customDeckList2"></div>
      </div>
      <div id="deckDetailView" class="hidden">
        <button class="btn secondary" id="backToDeckList" style="margin-bottom:14px;">← Orqaga</button>
        <h2 id="deckDetailName"></h2>
        <div class="btn-row" style="margin:10px 0 20px;">
          <button class="btn" id="studyThisDeckBtn">O'rganish</button>
          <button class="btn danger" id="deleteDeckBtn">To'plamni o'chirish</button>
        </div>
        <div class="card" style="margin-bottom:16px;">
          <p class="section-label" style="margin-bottom:12px;">Karta qo'shish</p>
          <form id="addCardForm">
            <div class="field"><label>Old tomon (savol)</label><input id="cardFront" required></div>
            <div class="field"><label>Orqa tomon (javob)</label><input id="cardBack" required></div>
            <div class="field"><label>Ieroglif (ixtiyoriy — yozish katagi ko'rsatiladi)</label><input id="cardHanzi"></div>
            <div class="field"><label>Pinyin (ixtiyoriy)</label><input id="cardPinyin"></div>
            <button type="submit" class="btn" style="margin-top:14px;">Qo'shish</button>
          </form>
        </div>
        <p class="section-label">Kartalar</p>
        <div id="cardListInDeck"></div>
      </div>
    </div>

    <!-- STUDY TAB -->
    <div id="tab-study" class="tabpanel hidden">
      <div class="study-head">
        <button class="btn secondary" id="exitStudyBtn">← Chiqish</button>
        <span class="study-meta" id="studyMeta"></span>
      </div>
      <div class="card-stage" id="cardStage"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="hsk-data.js"></script>
<script src="app.js"></script>
</body>
</html>
